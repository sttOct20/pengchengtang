      max-width: 860px;
      margin: 0 auto;

    .article-hero-tag {
      font-size: .75rem;
      letter-spacing: .25em;
      color: var(--gold);
      margin-bottom: 14px;
    }
    .article-hero-title {

      color: #fff;

      color: rgba(255,255,255,.5);
    }
    .article-body {
      max-width: 760px;
      margin: 64px auto;
      padding: 0 24px 80px;
      font-size: 1.05rem;
      line-height: 2;
      color: #333;
    }
    .article-body h1,.article-body h2,.article-body h3 {
      margin: 2em 0 .8em;
      line-height: 1.4;
      color: var(--black);
    }
    .article-body h1{font-size:1.8rem}
    .article-body h2{font-size:1.4rem}
    .article-body h3{font-size:1.15rem}
    .article-body p{margin-bottom:1.2em}
    .article-body img{max-width:100%;border-radius:6px;margin:1em 0}
    .article-body blockquote{border-left:3px solid var(--red);padding:12px 20px;margin:1.5em 0;background:#fef9f9;color:#555;font-style:italic}
    .article-body ul,.article-body ol{padding-left:1.8em;margin-bottom:1.2em}
    .article-body li{margin-bottom:.4em}
    .article-body a{color:var(--red);text-decoration:underline}
    .back-link {

      align-items: center;
      gap: 6px;
      color: var(--red);

      font-size: .9rem;

    .back-link:hover{opacity:.75}
    .loading {

      padding: 120px 20px;
      color: #bbb;

    }
    .error-state {

    }
    @media(max-width:768px){
      .article-hero{height:300px}

<script>
async function loadArticle() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const main = document.getElementById('mainContent');

  if (!id) {
    main.innerHTML = '<div class="error-state"><p>文章不存在</p><a href="learning.html" style="color:#C41E3A">← 返回健康学堂</a></div>';
    return;
  }

  try {
    const res = await fetch('/api/articles.php?id=' + encodeURIComponent(id) + '&full=1&limit=100');
    const data = await res.json();
    const articles = data.articles || [];
    const article = articles.find(a => a.id === id);

    if (!article) {
      main.innerHTML = '<div class="error-state"><p>文章未找到</p><a href="learning.html" style="color:#C41E3A">← 返回健康学堂</a></div>';
      return;
    }

    document.title = article.title + ' — 彭城堂中医';

    const heroImg = article.thumbnail
      ? `<img src="${article.thumbnail}" alt="${article.title}">`
      : `<div class="article-hero-ph">炁</div>`;

    const author = article.author ? article.author : '彭城堂医师团队';
    const metaParts = [author];
    if (article.publishedDate) metaParts.push(article.publishedDate);

    main.innerHTML = `
      <div class="article-hero">
        ${heroImg}
        <div class="article-hero-content">
          <p class="article-hero-tag">${article.category || ''}</p>
          <h1 class="article-hero-title">${article.title}</h1>
          <p class="article-hero-meta">${metaParts.join(' &ensp;·&ensp; ')}</p>
        </div>
      </div>
      <div class="article-body">
        <a href="learning.html" class="back-link">← 返回健康学堂</a>
        ${article.content || '<p>内容加载中...</p>'}
      </div>
    `;
  } catch(e) {
    main.innerHTML = '<div class="error-state"><p>加载失败，请稍后重试</p><a href="learning.html" style="color:#C41E3A">← 返回健康学堂</a></div>';
  }
}

loadArticle();
</script>
